name: MyApp
options:
  bundleIdPrefix: com.myapp
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  MyApp:
    build:
      targets:
        MyApp: all
        MyAppTests: [test]
    test:
      targets:
        - MyAppTests
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"

targets:
  MyApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MyApp
    settings:
      base:
        PRODUCT_NAME: MyApp
        PRODUCT_BUNDLE_IDENTIFIER: com.myapp.MyApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
    info:
      path: MyApp/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: MyApp
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  MyAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MyAppTests
    dependencies:
      - target: MyApp
    settings:
      base:
        PRODUCT_NAME: MyAppTests
        PRODUCT_BUNDLE_IDENTIFIER: com.myapp.MyAppTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MyApp"
