name: Divvy
options:
  bundleIdPrefix: com.divvy
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  Divvy:
    build:
      targets:
        Divvy: all
        DivvyTests: [test]
    test:
      targets:
        - DivvyTests
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"

targets:
  Divvy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Divvy
    settings:
      base:
        PRODUCT_NAME: Divvy
        PRODUCT_BUNDLE_IDENTIFIER: com.divvy.Divvy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
    info:
      path: Divvy/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Divvy
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  DivvyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DivvyTests
    dependencies:
      - target: Divvy
    settings:
      base:
        PRODUCT_NAME: DivvyTests
        PRODUCT_BUNDLE_IDENTIFIER: com.divvy.DivvyTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Divvy.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Divvy"
