name = "myapp-api-proxy"
main = "src/index.ts"
compatibility_date = "2024-05-12"

# Secrets (set via `npx wrangler secret put <NAME>`):
#   MASSIVE_API_KEY   — real Massive API key
#   FINNHUB_API_KEY   — free Finnhub API key (60 req/min)
#   ANTHROPIC_API_KEY — Claude API key for AI report generation
#   APP_TOKEN         — shared secret the iOS app sends in X-App-Token header
